name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: upcap-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Recreate rolling latest release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          gh release delete debug-apk-latest --repo "${{ github.repository }}" --yes || true
          git push --delete origin debug-apk-latest || true
          gh release create debug-apk-latest \
            app/build/outputs/apk/debug/app-debug.apk#app-debug.apk \
            --repo "${{ github.repository }}" \
            --title "UpCap v${VERSION_NAME} (Debug APK)" \
            --notes "$(cat <<EOF
          **버전**: v${VERSION_NAME} (빌드 ${VERSION_CODE})
          **커밋**: ${{ github.sha }}
          **날짜**: $(date -u +%Y-%m-%d\ %H:%M\ UTC)

          [다운로드 페이지](https://${{ github.repository_owner }}.github.io/UpCap/)에서도 설치 가능합니다.
          EOF
          )" \
            --prerelease

      - name: Write release links
        if: github.event_name != 'pull_request'
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          {
            echo "## APK v${VERSION_NAME}"
            echo
            echo "- Release page: https://github.com/${{ github.repository }}/releases/tag/debug-apk-latest"
            echo "- Direct download: https://github.com/${{ github.repository }}/releases/download/debug-apk-latest/app-debug.apk"
          } >> "$GITHUB_STEP_SUMMARY"
